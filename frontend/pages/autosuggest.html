<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar{
            position:fixed;
            top: 10px;
            left: 10px;
        }
        .right-bar{
            position:fixed;
            top: 10px;
            right: 10px;
        }
        .search-section{
            text-align: center;
            margin-top: 100px;
        }
        .logocolor{
            color:rgb(99, 88, 144);
        }
        .tag-line{
            color:gray;
        }
        .lens{
            position: relative;
            left:45px;
        }
        .search-box{
            padding:15px 15px 15px 45px;
            border-radius: 30px;
            width: 40%;
        }
        #suggestion-box{
            /* border:1px solid black; */
            margin-left:26%;
            padding:15px 15px 15px 45px;
            /* border-radius:30px; */
            left: 30%;
            width: 40%;
            
        }
        #suggestion-item{
            border:1px solid grey;
            padding:10px;
            border-radius: 10px;               
        }
    </style>
</head>
<body>
    <div>
    <span class="left-bar">&#9881;</span>
    <span class="right-bar">&#8226; online | &#128337; - ms</span>
</div>
    <div class="search-section">
        <h1><span class="logocolor">Chandana</span>Infinity </h1>
        <p class="tag-line">One million phrases. Four algorithms. Prefix based Auto Suggestions</p>
        <span>
            <span class="lens">&#128269;</span>
                 <input class="search-box" id="search-box" type="text" placeholder="Search here...">
        </span>
        <div id="suggestion-box">
            <!-- suggestion box -->
        </div>
    </div>
    <script>
       var searchBox = document.getElementById("search-box");
var suggestionBox = document.getElementById("suggestion-box");
        searchBox.addEventListener("input",function(){
            //1. get user type text
            var userInput=searchBox.value;
            if(userInput.trim()===""){

            }
            else{
                var url1= "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3="&algorithm=brute&limit=10&weighted=false";
                var url=url1+userInput+url3;


            
            //2.make call to get suggestion
            fetch(url)
            .then(function(response){
                return response.json();
            })
            .then(function(data){
                console.log(data);
                var resultsArray=data.results;
                var htmlResults="";
                for(var i=0;i<resultsArray.length;i++){
                    htmlResults+= "<div id='suggestion-item'>" + resultsArray[i].text+ "</div>"
                }
                suggestionBox.innerHTML=htmlResults;
            })
            // display data in html
        
    }
})
    </script>
</body>
</html>
